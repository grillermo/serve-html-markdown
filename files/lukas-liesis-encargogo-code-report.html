    :root {

      --accent: #0f766e;
      --accent-soft: #d2f0ec;
      --warn: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:

        radial-gradient(circle at 100% 20%, #e0ece6 0, transparent 35%),
        var(--bg);
    }
    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 3px;
    }
    .repo-total {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--accent-soft);
      color: #0a4943;
      font-weight: 700;
    }
    .repo-total small {
      font-weight: 500;
      opacity: 0.85;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) 1fr;
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 84px);
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);

    .sidebar {
      padding: 14px;

      gap: 10px;
      overflow: auto;

      margin: 2px 0 0;
      font-size: 15px;

      letter-spacing: 0.06em;

    .filter {

      border-radius: 8px;
      padding: 10px 11px;
      font-size: 14px;
      outline: none;
      background: #fff;

    .filter:focus {

    .tree {

      flex-direction: column;

    .tree-row {
      display: flex;

      display: flex;

      align-items: baseline;

      color: var(--ink);

    }
    .tree-link:hover {
      background: #f4f0ea;
    }
    .tree-link.active {
      background: var(--accent-soft);
      color: #0a4943;
      font-weight: 700;
    }
    .tree-pct {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      font-size: 13px;
    }
    .main {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }
    .summary {
      padding: 16px 18px;
    }
    .breadcrumb {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      margin-bottom: 10px;
    }
    .crumb {
      border: none;
      background: transparent;
      color: inherit;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      font-size: 13px;
    }
    .crumb:hover {
      background: #f4f0ea;
      color: var(--ink);
    }
    .folder-title {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.15;
      word-break: break-word;
    }
    .kpi {
      display: grid;
      grid-template-columns: 110px 1fr;
      align-items: center;
      gap: 60px;
    }
    .kpi-value {
      font-size: 32px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .bar {
      background: #efeae3;
      border-radius: 999px;
      height: 14px;
      overflow: hidden;
      border: 1px solid #e5ddd3;
    }
    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #0ea5a2);
      transition: width 180ms ease;
    }
    .meta {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
    }
    .children {
      padding: 14px 0 4px;
      overflow: hidden;
    }
    .section-title {
      margin: 0;
      padding: 0 18px 10px;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 18px;
      border-top: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-top: none;
    }
    .num {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .open-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
    }
    .open-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .empty {
      padding: 12px 18px 16px;
      color: var(--muted);
      font-style: italic;
    }
    .warning {
      color: var(--warn);
      font-size: 13px;
      margin-top: 8px;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        max-height: 40vh;
      }
      .kpi {
        grid-template-columns: 1fr;
      }
    }
  </style>

    const AUTHOR_LABEL = "Lukas";
    const TOTAL_REPO = 28.30;
    const ROOT_PATH = ".";
    const treeEl = document.getElementById("tree");
    const filterEl = document.getElementById("folderFilter");
    const breadcrumbEl = document.getElementById("breadcrumb");
    const titleEl = document.getElementById("folderTitle");
    const pctEl = document.getElementById("folderPct");
    const pctBarEl = document.getElementById("folderPctBar");
    const metaEl = document.getElementById("folderMeta");
    const childrenTableEl = document.getElementById("childrenTable");
    const childrenEmptyEl = document.getElementById("childrenEmpty");
    const filesTableEl = document.getElementById("filesTable");
    const filesEmptyEl = document.getElementById("filesEmpty");
    const warningEl = document.getElementById("missingFolderWarning");
    document.getElementById("authorName").textContent = AUTHOR_LABEL;
    document.getElementById("repoTotal").innerHTML =
      TOTAL_REPO === null
        ? `<small>Total repo for ${AUTHOR_LABEL}</small> unavailable`
        : `<small>Total repo for ${AUTHOR_LABEL}</small> ${formatPct(TOTAL_REPO)}`;

    const expanded = new Set([ROOT_PATH]);

    function formatPct(value) {
      return `${Number(value).toFixed(2)}%`;
    }

    function compareChildren(a, b) {
      const pctDiff = (NODES[b]?.percentage ?? 0) - (NODES[a]?.percentage ?? 0);
      if (pctDiff !== 0) return pctDiff;
      return a.localeCompare(b);
    }

    function compareFiles(a, b) {
      const pctDiff = (FILES[b]?.percentage ?? 0) - (FILES[a]?.percentage ?? 0);
      if (pctDiff !== 0) return pctDiff;
      return a.localeCompare(b);
    }

    function folderLabel(path) {
      if (path === ROOT_PATH) return ".";
      const node = NODES[path];
      return node?.name ?? path.split("/").pop();
    }

    function ancestors(path) {
      if (path === ROOT_PATH) return [ROOT_PATH];
      const parts = path.split("/");
      const chain = [ROOT_PATH];
      for (let i = 0; i < parts.length; i++) {
        chain.push(parts.slice(0, i + 1).join("/"));
      }
      return chain;
    }

    function ensureExpanded(path) {
      for (const anc of ancestors(path)) {
        expanded.add(anc);
      }
    }

    function hasChildren(path) {
      return (NODES[path]?.children?.length ?? 0) > 0;
    }

    function setRoute(path) {
      window.location.hash = encodeURIComponent(path);
    }

    function currentPathFromHash() {
      const raw = decodeURIComponent((window.location.hash || "").replace(/^#/, ""));
      if (!raw) return ROOT_PATH;
      return raw in NODES ? raw : ROOT_PATH;
    }

    function renderTree(selectedPath) {
      const query = filterEl.value.trim().toLowerCase();
      treeEl.innerHTML = "";

      if (query) {
        const matches = Object.keys(NODES)
          .filter((p) => p.toLowerCase().includes(query))
          .sort(compareChildren);

        if (matches.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No folders match this filter.";
          treeEl.appendChild(empty);
          return;
        }

        for (const path of matches) {
          const row = document.createElement("div");
          row.className = "tree-row";
          const btn = document.createElement("button");
          btn.className = "tree-link" + (path === selectedPath ? " active" : "");
          btn.innerHTML = `<span>${path}</span><span class="tree-pct">${formatPct(NODES[path].percentage)}</span>`;
          btn.addEventListener("click", () => setRoute(path));
          row.appendChild(document.createElement("span"));
          row.appendChild(btn);
          treeEl.appendChild(row);
        }
        return;
      }

      const renderNode = (path, depth) => {
        const row = document.createElement("div");
        row.className = "tree-row";
        row.style.paddingLeft = `${depth * 14}px`;

        if (hasChildren(path)) {
          const toggle = document.createElement("button");
          toggle.className = "tree-toggle";
          toggle.textContent = expanded.has(path) ? "v" : ">";
          toggle.addEventListener("click", () => {
            if (expanded.has(path)) expanded.delete(path);
            else expanded.add(path);
            renderTree(selectedPath);
          });
          row.appendChild(toggle);
        } else {
          const spacer = document.createElement("span");
          spacer.style.display = "inline-block";
          spacer.style.width = "18px";
          row.appendChild(spacer);
        }

        const btn = document.createElement("button");
        btn.className = "tree-link" + (path === selectedPath ? " active" : "");
        btn.innerHTML =
          `<span>${folderLabel(path)}</span>` +
          `<span class="tree-pct">${formatPct(NODES[path].percentage)}</span>`;
        btn.addEventListener("click", () => setRoute(path));
        row.appendChild(btn);
        treeEl.appendChild(row);

        if (hasChildren(path) && expanded.has(path)) {
          const children = [...NODES[path].children].sort(compareChildren);
          for (const child of children) {
            renderNode(child, depth + 1);
          }
        }
      };

      renderNode(ROOT_PATH, 0);
    }

    function renderBreadcrumb(path) {
      breadcrumbEl.innerHTML = "";
      const chain = ancestors(path);
      chain.forEach((entry, index) => {
        const crumb = document.createElement("button");
        crumb.className = "crumb";
        crumb.textContent = folderLabel(entry);
        crumb.addEventListener("click", () => setRoute(entry));
        breadcrumbEl.appendChild(crumb);
        if (index < chain.length - 1) {
          const sep = document.createElement("span");
          sep.textContent = ">";
          breadcrumbEl.appendChild(sep);
        }
      });
    }

    function renderChildren(path) {
      childrenTableEl.innerHTML = "";
      const node = NODES[path];
      const children = [...(node?.children ?? [])].sort(compareChildren);

      if (children.length === 0) {
        childrenEmptyEl.style.display = "block";
        return;
      }

      childrenEmptyEl.style.display = "none";
      for (const child of children) {
        const childNode = NODES[child];
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${folderLabel(child)}</td>
          <td class="num">${formatPct(childNode.percentage)}</td>
          <td><button class="open-btn" data-path="${child}">Open</button></td>
        `;
        tr.querySelector(".open-btn").addEventListener("click", () => setRoute(child));
        childrenTableEl.appendChild(tr);
      }
    }

    function renderFiles(path) {
      filesTableEl.innerHTML = "";
      const node = NODES[path];
      const files = [...(node?.files ?? [])].sort(compareFiles);

      if (files.length === 0) {
        filesEmptyEl.style.display = "block";
        return;
      }

      filesEmptyEl.style.display = "none";
      for (const filePath of files) {
        const file = FILES[filePath];
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${file.name}</td>
          <td class="num">${formatPct(file.percentage)}</td>
          <td class="num">${file.authoredLines}/${file.totalLines}</td>
        `;
        filesTableEl.appendChild(tr);
      }
    }

    function renderSelection(path) {
      const node = NODES[path];
      if (!node) {
        warningEl.style.display = "block";
        warningEl.textContent = `Folder "${path}" was not found. Showing repository root.`;
        path = ROOT_PATH;
      } else {
        warningEl.style.display = "none";
      }

      const current = NODES[path];
      ensureExpanded(path);
      renderTree(path);
      renderBreadcrumb(path);

      titleEl.textContent = path;
      pctEl.textContent = formatPct(current.percentage);
      pctBarEl.style.width = `${Math.max(0, Math.min(100, current.percentage)).toFixed(2)}%`;
      const childCount = current.children.length;
      const fileCount = current.files.length;
      metaEl.textContent =
        `${childCount} immediate subfolder${childCount === 1 ? "" : "s"}, ` +
        `${fileCount} file${fileCount === 1 ? "" : "s"} in this folder`;

      renderChildren(path);
      renderFiles(path);
    }

    function onRouteChange() {
      renderSelection(currentPathFromHash());
    }

    filterEl.addEventListener("input", () => renderTree(currentPathFromHash()));
    window.addEventListener("hashchange", onRouteChange);

    if (!window.location.hash) {
      setRoute(ROOT_PATH);
    } else {
      onRouteChange();
    }
  </script>
</body>
</html>
